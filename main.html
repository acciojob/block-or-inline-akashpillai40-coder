<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div>
  <button data-ns-test="block-inline-button">Test1</button>
  <button data-ns-test="block-inline-button">Test2</button>
  <p>Answer: Inline</p>
</div>

<div>
  <div data-ns-test="block-inline-div"></div>
  <div data-ns-test="block-inline-div"></div>
  <p>Answer: Block</p>
</div>

<div>
  <span data-ns-test="block-inline-span"></span>
  <span data-ns-test="block-inline-span"></span>
  <p>Answer: Inline</p>
</div>

<div>
  <p data-ns-test="block-inline-p"></p>
  <p data-ns-test="block-inline-p"></p>
  <p>Answer: Block</p>
</div>

<div>
  <input data-ns-test="block-inline-input" value="Test1">
  <input data-ns-test="block-inline-input" value="Test2">
  <p>Answer: Inline</p>
</div>

<div>
  <cite data-ns-test="block-inline-cite"></cite>
  <cite data-ns-test="block-inline-cite"></cite>
  <p>Answer: Inline</p>
</div>

<div>
  <code data-ns-test="block-inline-code"></code>
  <code data-ns-test="block-inline-code"></code>
  <p>Answer: Inline</p>
</div>

<div>
  <h1 data-ns-test="block-inline-h1"></h1>
  <h1 data-ns-test="block-inline-h1"></h1>
  <p>Answer: Block</p>
</div>

<div>
  <sup data-ns-test="block-inline-sup"></sup>
  <sup data-ns-test="block-inline-sup"></sup>
  <p>Answer: Inline</p>
</div>

<div>
  <sub data-ns-test="block-inline-sub"></sub>
  <sub data-ns-test="block-inline-sub"></sub>
  <p>Answer: Inline</p>
</div>

<script src="./script.js"></script>
</body>
</html>
